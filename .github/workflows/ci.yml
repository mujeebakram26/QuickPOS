name: CI Pipeline

on:
  push:
    branches: [ main, develop, 'feature/**', 'bugfix/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-and-quality:
    name: Test and Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:latest
          extensions: mbstring, json

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Check PHP syntax
        run: |
          echo "Checking PHP files for syntax errors..."
          for file in $(find src -name "*.php"); do
            php -l "$file" || exit 1
          done
          echo "✓ All PHP files have valid syntax"

      - name: Run automated tests
        run: |
          echo "Running automated tests..."
          ./vendor/bin/phpunit tests/ --testdox
          echo "✓ All tests passed"

      - name: Install PHPStan
        run: composer require --dev phpstan/phpstan

      - name: Run PHPStan code quality checks
        run: |
          echo "Running code quality checks..."
          ./vendor/bin/phpstan analyse src --level=2 || true
          echo "✓ Code quality check complete"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
            reports/
          retention-days: 30

  validate-commit-messages:
    name: Validate Commit Messages
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages contain Jira ID
        run: |
          echo "Validating commit messages..."
          
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_COMMIT="${{ github.event.pull_request.base.sha }}"
          else
            BASE_COMMIT="HEAD~1"
          fi
          
          for commit in $(git rev-list $BASE_COMMIT...HEAD); do
            MESSAGE=$(git log --format=%B -n 1 $commit)
            
            if ! echo "$MESSAGE" | grep -E '^\[POS-[0-9]+\]' > /dev/null; then
              echo "❌ Commit $commit does not have Jira ID in format [POS-XXX]"
              echo "Message: $MESSAGE"
              exit 1
            fi
          done
          
          echo "✓ All commit messages have valid Jira IDs"

  security-checks:
    name: Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run basic security checks
        run: |
          echo "Running security checks..."
          
          grep -r "\$_REQUEST" src/ && echo "⚠ Warning: Using \$_REQUEST found" || echo "✓ No unsafe \$_REQUEST usage"
          grep -r "eval(" src/ && echo "⚠ Warning: eval() found" || echo "✓ No eval() usage"
          
          echo "✓ Security checks complete"